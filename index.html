<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #080808;
      --card: #0f0f0f;
      --border: #1e1e1e;
      --border-hover: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --dimmed: #444;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-weight: 400;
      font-size: 12px;
      line-height: 1.4;
      min-height: 100vh;
    }

    body {
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }

    .header-left h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .header-left p {
      font-size: 10px;
      color: var(--muted);
    }

    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text);
      padding: 4px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 3px;
    }

    .alert-badge {
      background: #8b3333;
      color: #fff;
      min-width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
    }

    /* Alert Banner */
    #alertBanner {
      display: none;
      background: #2a1515;
      border-bottom: 1px solid #8b3333;
      padding: 12px 16px;
      gap: 12px;
      flex-direction: column;
    }

    #alertBanner.visible {
      display: flex;
    }

    .alert-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 8px;
      border-left: 2px solid #8b3333;
      padding-left: 10px;
    }

    .alert-time {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
      min-width: 40px;
    }

    .alert-message {
      flex: 1;
      font-size: 11px;
      color: var(--text);
    }

    .alert-dismiss {
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      flex-shrink: 0;
      line-height: 1;
    }

    .alert-dismiss:hover {
      color: var(--text);
    }

    /* Main Content */
    main {
      flex: 1;
      padding: 16px;
    }

    /* Project Grid */
    .projects-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (min-width: 900px) {
      .projects-grid {
        grid-template-columns: repeat(3, 1fr);
        margin-bottom: 32px;
      }

      .projects-grid .project-card:nth-child(4),
      .projects-grid .project-card:nth-child(5) {
        grid-column: auto;
      }

      .projects-grid {
        align-items: start;
      }

      .projects-grid > :nth-child(4) {
        grid-column: 2 / 3;
        grid-row: 2;
      }

      .projects-grid > :nth-child(5) {
        grid-column: 3 / 4;
        grid-row: 2;
      }
    }

    /* Project Card */
    .project-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 2px solid;
      border-radius: 4px;
      padding: 16px;
      position: relative;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: slideIn 0.5s ease forwards;
      opacity: 0;
      transform: translateY(12px);
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .project-card:nth-child(1) { animation-delay: 0s; border-top-color: rgba(94, 173, 212, 0.7); }
    .project-card:nth-child(2) { animation-delay: 0.1s; border-top-color: rgba(201, 150, 74, 0.7); }
    .project-card:nth-child(3) { animation-delay: 0.2s; border-top-color: rgba(139, 107, 177, 0.7); }
    .project-card:nth-child(4) { animation-delay: 0.3s; border-top-color: rgba(74, 158, 122, 0.7); }
    .project-card:nth-child(5) { animation-delay: 0.4s; border-top-color: rgba(107, 107, 177, 0.7); }

    .project-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      position: relative;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .status-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0;
      background: none;
      border: none;
    }

    .status-badge.active { color: #7a9f6f; }
    .status-badge.launching { color: #b89f5f; }
    .status-badge.blocked { color: #8b5555; }
    .status-badge.on-hold { color: var(--muted); }

    .milestone-pct {
      position: absolute;
      top: 0;
      right: 0;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }

    .focus-line {
      border-left: 2px solid;
      padding-left: 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 10px;
    }

    .stats-label {
      color: var(--muted);
    }

    .progress-bar {
      flex: 1;
      height: 1px;
      background: var(--dimmed);
      margin: 0 12px;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: var(--muted);
    }

    .mrr-row {
      margin-bottom: 12px;
    }

    .mrr-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .mrr-label {
      font-size: 10px;
      color: var(--muted);
    }

    .task-bar {
      display: flex;
      gap: 2px;
      margin-bottom: 12px;
      height: 8px;
    }

    .task-segment {
      flex: 1;
      background: var(--dimmed);
      border-radius: 1px;
    }

    .task-segment.done {
      background: currentColor;
      opacity: 0.6;
    }

    .weekly-chart {
      display: flex;
      gap: 3px;
      margin-bottom: 12px;
      align-items: flex-end;
      height: 20px;
      font-size: 9px;
      color: var(--muted);
    }

    .weekly-bar {
      flex: 1;
      background: var(--dimmed);
      border-radius: 1px;
      position: relative;
      cursor: pointer;
    }

    .weekly-bar.today {
      background: currentColor;
      opacity: 0.5;
    }

    .sparkline {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 60px;
      height: 24px;
    }

    .sparkline-line {
      stroke: currentColor;
      stroke-width: 1.5;
      fill: none;
      opacity: 0.4;
    }

    .next-action {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .last-activity {
      font-size: 10px;
      color: var(--muted);
      position: absolute;
      top: 48px;
      right: 16px;
    }

    /* Bottom Panels */
    .panels-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 900px) {
      .panels-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px;
      position: relative;
      animation: slideIn 0.5s ease forwards;
      opacity: 0;
      transform: translateY(12px);
    }

    .panel:nth-of-type(1) { animation-delay: 0.5s; }
    .panel:nth-of-type(2) { animation-delay: 0.6s; }
    .panel:nth-of-type(3) { animation-delay: 0.7s; }
    .panel:nth-of-type(4) { animation-delay: 0.8s; }

    .panel-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .panel-updated {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 9px;
      color: var(--muted);
    }

    /* Alerts Panel */
    .nominal {
      font-size: 11px;
      color: #7a9f6f;
    }

    .alert-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    .alert-item-panel {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 8px;
      border-left: 2px solid #8b3333;
      padding-left: 10px;
      background: rgba(139, 51, 51, 0.1);
      border-radius: 2px;
    }

    .alert-item-time {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
      min-width: 50px;
    }

    .alert-item-text {
      flex: 1;
      font-size: 11px;
      color: var(--text);
    }

    .alert-item-dismiss {
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      flex-shrink: 0;
      line-height: 1;
    }

    .alert-item-dismiss:hover {
      color: var(--text);
    }

    /* Activity Panel */
    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
      max-height: 200px;
      overflow-y: auto;
    }

    .activity-item {
      display: flex;
      gap: 8px;
      font-size: 11px;
      align-items: center;
      transition: opacity 0.3s;
    }

    .activity-time {
      color: var(--muted);
      flex-shrink: 0;
      min-width: 40px;
    }

    .activity-tag {
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .activity-tag.memory { background: rgba(94, 173, 212, 0.2); color: #5eadd4; }
    .activity-tag.deploy { background: rgba(139, 107, 177, 0.2); color: #8b6bb1; }
    .activity-tag.crm { background: rgba(94, 173, 212, 0.2); color: #5eadd4; }
    .activity-tag.intel { background: rgba(201, 150, 74, 0.2); color: #c9964a; }
    .activity-tag.system { background: rgba(136, 136, 136, 0.2); color: #888; }
    .activity-tag.jarvis { background: rgba(139, 107, 177, 0.2); color: #8b6bb1; }

    .activity-text {
      flex: 1;
      color: var(--text);
    }

    /* Spending Panel */
    .spending-section {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .spending-section:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .spending-title {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .spending-total {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .spending-stat {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .spending-stat-label {
      flex: 1;
    }

    .spending-stat-value {
      text-align: right;
    }

    .spending-item {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .spending-item:last-child {
      border-bottom: none;
    }

    .spending-item-name {
      flex: 1;
    }

    .spending-item-amount {
      text-align: right;
      flex-shrink: 0;
    }

    .spending-net {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 700;
      padding: 8px 0;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }

    .spending-net.positive .spending-net-amount {
      color: #7a9f6f;
    }

    .spending-net.negative .spending-net-amount {
      color: #8b5555;
    }

    /* System Panel */
    .system-section {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .system-section:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .uptime-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      padding: 6px 0;
    }

    .uptime-service {
      flex: 1;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.up {
      background: #7a9f6f;
    }

    .status-dot.down {
      background: #8b5555;
    }

    .api-usage-label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .api-usage-bar {
      width: 100%;
      height: 2px;
      background: var(--dimmed);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .api-usage-fill {
      height: 100%;
      background: var(--muted);
    }

    .api-usage-fill.high {
      background: #8b3333;
    }

    .api-cost-items {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .cron-info {
      font-size: 11px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .model-pill {
      display: inline-block;
      background: var(--border);
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 9px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .memory-info {
      font-size: 10px;
      color: var(--muted);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 12px 16px;
      font-size: 9px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .footer-left {
      flex: 1;
      text-align: left;
    }

    .footer-right {
      flex: 1;
      text-align: right;
    }

    .keyboard-hint {
      font-size: 8px;
      color: var(--dimmed);
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-hover);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-left">
      <h1>MISSION CONTROL</h1>
      <p>Nova · Brian Altmann · Las Vegas</p>
    </div>
    <div class="header-right">
      <div id="weatherPill" class="pill">
        <span id="weatherIcon">—</span>
        <span id="weatherTemp">—</span>
      </div>
      <div id="shiftPill" class="pill" style="display: none;">
        <span id="shiftStatus">—</span>
      </div>
      <div id="alertBadge" class="alert-badge" style="display: none;"></div>
    </div>
  </header>

  <!-- Alert Banner -->
  <div id="alertBanner"></div>

  <!-- Main Content -->
  <main>
    <!-- Project Cards -->
    <div class="projects-grid" id="projectsGrid"></div>

    <!-- Bottom Panels -->
    <div class="panels-grid">
      <div class="panel">
        <div class="panel-title">ALERTS</div>
        <div id="alertsPanel"></div>
        <div class="panel-updated">
          <span id="alertsPanelTime">—</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">NOVA ACTIVITY</div>
        <div id="activityPanel"></div>
        <div class="panel-updated">
          <span id="activityPanelTime">—</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">SPENDING</div>
        <div id="spendingPanel"></div>
        <div class="panel-updated">
          <span id="spendingPanelTime">—</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">SYSTEM</div>
        <div id="systemPanel"></div>
        <div class="panel-updated">
          <span id="systemPanelTime">—</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-left">MISSION CONTROL · Nova</div>
    <div>Last sync: <span id="lastSync">—</span></div>
    <div class="footer-right keyboard-hint">R refresh · 1-5 project · A alerts</div>
  </footer>

  <script>
    // Project data
    const PROJECTS = [
      {
        id: "liv-crm", name: "LIV CRM", initial: "L", color: "#5eadd4",
        status: "active",
        mrr: { actual: 3082, label: "Monthly Revenue" },
        milestone: { label: "LIFETIME SPEND FIX", pct: 100 },
        tasks: { done: 8, total: 10 },
        lastActivity: "2h",
        focus: "670 guest profiles · $3.08M revenue tracked",
        nextAction: "Upload 2024 & 2026 data for YOY comparison",
        spark: [20,45,30,60,40,80,65,90],
        weekly: [3,5,2,8,6,1,4]
      },
      {
        id: "liv-intel", name: "LIV INTEL", initial: "I", color: "#c9964a",
        status: "active",
        mrr: { actual: 0, label: "Revenue" },
        milestone: { label: "PWA v18 LIVE", pct: 100 },
        tasks: { done: 12, total: 14 },
        lastActivity: "4h",
        focus: "Social competitor monitor · 10 venues · 3x daily",
        nextAction: "Wire live analytics data to PWA charts",
        spark: [10,30,20,50,35,70,55,85],
        weekly: [2,4,1,6,5,0,3]
      },
      {
        id: "jarvis", name: "JARVIS VOICE", initial: "J", color: "#8b6bb1",
        status: "launching",
        mrr: { actual: 0, label: "Revenue" },
        milestone: { label: "AWAITING MIC", pct: 85 },
        tasks: { done: 7, total: 8 },
        lastActivity: "30m",
        focus: "Hey Jarvis · ElevenLabs George · Haiku + Flash",
        nextAction: "Plug in USB mic → run setup.sh → go live",
        spark: [0,0,10,20,40,60,75,85],
        weekly: [0,0,0,0,5,8,9]
      },
      {
        id: "epn", name: "EPN", initial: "E", color: "#4a9e7a",
        status: "launching",
        mrr: { actual: 0, label: "Revenue" },
        milestone: { label: "FOUNDATION", pct: 10 },
        tasks: { done: 1, total: 10 },
        lastActivity: "—",
        focus: "B2B lead intelligence platform",
        nextAction: "Define MVP scope and data sources",
        spark: [0,0,0,0,0,0,5,10],
        weekly: [0,0,0,0,0,0,1]
      },
      {
        id: "leaseowl", name: "LEASEOWL", initial: "O", color: "#6b6bb1",
        status: "launching",
        mrr: { actual: 0, label: "Revenue" },
        milestone: { label: "FOUNDATION", pct: 5 },
        tasks: { done: 0, total: 10 },
        lastActivity: "—",
        focus: "Real estate lease intelligence",
        nextAction: "Define MVP scope and target market",
        spark: [0,0,0,0,0,0,0,5],
        weekly: [0,0,0,0,0,0,0]
      }
    ];

    // State
    let data = {
      alerts: [],
      spending: null,
      system: null,
      activity: [],
      weather: null
    };

    let dismissedAlerts = new Set(JSON.parse(localStorage.getItem('dismissedAlerts') || '[]'));

    // Format time
    function formatTime(date) {
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    }

    // Format date for panel timestamps
    function formatPanelTime(date) {
      const h = String(date.getHours()).padStart(2, '0');
      const m = String(date.getMinutes()).padStart(2, '0');
      const s = String(date.getSeconds()).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    // Get shift status based on time
    function getShiftStatus() {
      const now = new Date();
      const hour = now.getHours();
      if (hour >= 12 && hour < 20) return "PRE-SHIFT";
      if (hour >= 20 && hour < 4) return "AT WORK";
      return "OFF SHIFT";
    }

    // Get weather icon
    function getWeatherIcon(condition, hour) {
      if (hour >= 6 && hour < 20) {
        if (condition.includes("Clear") || condition.includes("Sunny")) return "☀️";
        if (condition.includes("Cloud")) return "⛅";
        if (condition.includes("Rain")) return "🌧️";
        return "☀️";
      } else {
        return "🌙";
      }
    }

    // Fetch all data
    async function fetchData() {
      try {
        const [alerts, spending, system, activity, weather] = await Promise.all([
          fetch('data/alerts.json').then(r => r.json()).catch(() => []),
          fetch('data/spending.json').then(r => r.json()).catch(() => null),
          fetch('data/system.json').then(r => r.json()).catch(() => null),
          fetch('data/activity.json').then(r => r.json()).catch(() => []),
          fetch('data/weather.json').then(r => r.json()).catch(() => null)
        ]);

        data.alerts = alerts || [];
        data.spending = spending;
        data.system = system;
        data.activity = activity || [];
        data.weather = weather;

        updateUI();
      } catch (err) {
        console.error('Error fetching data:', err);
      }
    }

    // Update UI
    function updateUI() {
      updateHeader();
      updateAlertBanner();
      updateProjectCards();
      updateAlertPanel();
      updateActivityPanel();
      updateSpendingPanel();
      updateSystemPanel();
      updateFooter();
    }

    // Update header
    function updateHeader() {
      const now = new Date();
      
      // Weather
      if (data.weather) {
        const icon = getWeatherIcon(data.weather.condition || '', now.getHours());
        document.getElementById('weatherIcon').textContent = icon;
        document.getElementById('weatherTemp').textContent = `${data.weather.temp}°F`;
      }

      // Shift
      const shift = getShiftStatus();
      const shiftPill = document.getElementById('shiftPill');
      document.getElementById('shiftStatus').textContent = shift;
      shiftPill.style.display = 'flex';

      // Alert badge
      const activeAlerts = data.alerts.filter(a => !dismissedAlerts.has(a.id || a.timestamp)).length;
      const alertBadge = document.getElementById('alertBadge');
      if (activeAlerts > 0) {
        alertBadge.textContent = activeAlerts;
        alertBadge.style.display = 'flex';
      } else {
        alertBadge.style.display = 'none';
      }
    }

    // Update alert banner
    function updateAlertBanner() {
      const banner = document.getElementById('alertBanner');
      const activeAlerts = data.alerts.filter(a => !dismissedAlerts.has(a.id || a.timestamp));

      if (activeAlerts.length === 0) {
        banner.classList.remove('visible');
        return;
      }

      banner.classList.add('visible');
      banner.innerHTML = activeAlerts.map((alert, idx) => `
        <div class="alert-item">
          <div class="alert-time">${alert.timestamp || '—'}</div>
          <div class="alert-message">${alert.message || alert.text || ''}</div>
          <div class="alert-dismiss" onclick="dismissAlert('${alert.id || alert.timestamp}')">✕</div>
        </div>
      `).join('');
    }

    // Dismiss alert
    function dismissAlert(id) {
      dismissedAlerts.add(id);
      localStorage.setItem('dismissedAlerts', JSON.stringify([...dismissedAlerts]));
      updateAlertBanner();
      updateHeader();
    }

    // Update project cards
    function updateProjectCards() {
      const grid = document.getElementById('projectsGrid');
      grid.innerHTML = PROJECTS.map(p => {
        const tasks = Array(p.tasks.total).fill(0).map((_, i) => i < p.tasks.done);
        const today = new Date().getDay();
        const todayIndex = today === 0 ? 6 : today - 1;

        // Generate sparkline path
        const sparkMin = Math.min(...p.spark);
        const sparkMax = Math.max(...p.spark);
        const sparkRange = sparkMax - sparkMin || 1;
        const sparkPoints = p.spark.map((v, i) => {
          const x = (i / (p.spark.length - 1)) * 60;
          const y = 24 - ((v - sparkMin) / sparkRange) * 24;
          return `${x},${y}`;
        }).join(' ');

        return `
          <div class="project-card" style="--color: ${p.color}; color: ${p.color};">
            <div style="position: relative; margin-bottom: 32px;">
              <div class="card-header">
                <div class="card-title">${p.name}</div>
                <div class="status-badge ${p.status}">${p.status.toUpperCase()}</div>
                <div class="last-activity">${p.lastActivity}</div>
              </div>
              <div class="milestone-pct">${p.milestone.pct}%</div>
              <svg class="sparkline" viewBox="0 0 60 24" style="color: ${p.color};">
                <polyline class="sparkline-line" points="${sparkPoints}"/>
              </svg>
            </div>

            <div class="card-divider"></div>

            <div class="focus-line" style="border-left-color: ${p.color};">
              ${p.focus}
            </div>

            <div class="stats-row">
              <span class="stats-label">${p.milestone.label}</span>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${p.milestone.pct}%; background-color: ${p.color};"></div>
              </div>
            </div>

            ${p.mrr.actual > 0 ? `
              <div class="mrr-row">
                <div class="mrr-value">$${p.mrr.actual.toLocaleString()}</div>
                <div class="mrr-label">${p.mrr.label}</div>
              </div>
            ` : ''}

            <div class="task-bar" style="color: ${p.color};">
              ${tasks.map(done => `
                <div class="task-segment ${done ? 'done' : ''}"></div>
              `).join('')}
            </div>

            <div class="weekly-chart" style="color: ${p.color};">
              ${p.weekly.map((val, i) => `
                <div class="weekly-bar ${i === todayIndex ? 'today' : ''}" style="height: ${Math.max(4, val * 3)}px;" title="${['M','T','W','T','F','S','S'][i]}"></div>
              `).join('')}
            </div>

            <div class="next-action">${p.nextAction}</div>
          </div>
        `;
      }).join('');
    }

    // Update alert panel
    function updateAlertPanel() {
      const panel = document.getElementById('alertsPanel');
      const activeAlerts = data.alerts.filter(a => !dismissedAlerts.has(a.id || a.timestamp));

      if (activeAlerts.length === 0) {
        panel.innerHTML = '<div class="nominal">All systems nominal</div>';
      } else {
        panel.innerHTML = `
          <div class="alert-list">
            ${activeAlerts.map(alert => `
              <div class="alert-item-panel">
                <div class="alert-item-time">${alert.timestamp || '—'}</div>
                <div class="alert-item-text">${alert.message || alert.text || ''}</div>
                <div class="alert-item-dismiss" onclick="dismissAlert('${alert.id || alert.timestamp}')">✕</div>
              </div>
            `).join('')}
          </div>
        `;
      }

      document.getElementById('alertsPanelTime').textContent = formatPanelTime(new Date());
    }

    // Update activity panel
    function updateActivityPanel() {
      const panel = document.getElementById('activityPanel');

      if (!data.activity || data.activity.length === 0) {
        panel.innerHTML = '<div class="nominal">No recent activity</div>';
      } else {
        const tagColors = {
          memory: '#5eadd4',
          deploy: '#8b6bb1',
          crm: '#5eadd4',
          intel: '#c9964a',
          system: '#888',
          jarvis: '#8b6bb1'
        };

        panel.innerHTML = `
          <div class="activity-list">
            ${data.activity.slice(0, 10).map((item, idx) => {
              const opacity = 1 - (idx * 0.04);
              return `
                <div class="activity-item" style="opacity: ${opacity};">
                  <div class="activity-time">${item.time || '—'}</div>
                  <div class="activity-tag ${item.type || ''}">${(item.type || 'log').toUpperCase()}</div>
                  <div class="activity-text">${item.text || item.message || ''}</div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }

      document.getElementById('activityPanelTime').textContent = formatPanelTime(new Date());
    }

    // Update spending panel
    function updateSpendingPanel() {
      const panel = document.getElementById('spendingPanel');

      if (!data.spending) {
        panel.innerHTML = '<div class="nominal">No spending data</div>';
      } else {
        const monthly = data.spending.monthly_revenue || 0;
        const nightly = Math.floor(monthly / 30);
        const topNight = data.spending.top_night || 0;
        const ops = data.spending.ops_cost || {};
        const items = ops.items || [];
        const opsCost = ops.total || 0;
        const net = monthly - opsCost;

        panel.innerHTML = `
          <div class="spending-section">
            <div class="spending-title">LIV REVENUE</div>
            <div class="spending-total">$${monthly.toLocaleString()}</div>
            <div class="spending-stat">
              <span class="spending-stat-label">Nightly avg</span>
              <span class="spending-stat-value">$${nightly.toLocaleString()}</span>
            </div>
            <div class="spending-stat">
              <span class="spending-stat-label">Top night</span>
              <span class="spending-stat-value">$${topNight.toLocaleString()}</span>
            </div>
          </div>

          <div class="spending-section">
            <div class="spending-title">COST OF OPERATIONS</div>
            ${items.map(item => `
              <div class="spending-item">
                <span class="spending-item-name">${item.name}</span>
                <span class="spending-item-amount">$${item.amount.toLocaleString()}</span>
              </div>
            `).join('')}
            <div class="spending-item" style="font-weight: 700; border-top: 1px solid var(--border); margin-top: 8px; padding-top: 8px;">
              <span class="spending-item-name">TOTAL</span>
              <span class="spending-item-amount">$${opsCost.toLocaleString()}</span>
            </div>
            <div class="spending-net ${net > 0 ? 'positive' : 'negative'}">
              <span>NET</span>
              <span class="spending-net-amount">$${net.toLocaleString()}</span>
            </div>
          </div>
        `;
      }

      document.getElementById('spendingPanelTime').textContent = formatPanelTime(new Date());
    }

    // Update system panel
    function updateSystemPanel() {
      const panel = document.getElementById('systemPanel');

      if (!data.system) {
        panel.innerHTML = '<div class="nominal">No system data</div>';
      } else {
        const uptime = data.system.uptime || {};
        const api = data.system.api || {};
        const cron = data.system.cron || {};
        const model = data.system.model || 'Nova';
        const memory = data.system.memory_updated || '—';

        const services = [
          { name: 'LIV CRM', status: uptime.livcrm },
          { name: 'LIV Intel', status: uptime.livintel },
          { name: 'n8n', status: uptime.n8n },
          { name: 'JARVIS Voice', status: uptime.jarvis },
          { name: 'WhatsApp', status: uptime.whatsapp },
          { name: 'OpenClaw', status: uptime.openclaw }
        ];

        const apiUsage = api.usage_pct || 0;
        const sonnetCost = api.sonnet_cost || 0;
        const haikuCost = api.haiku_cost || 0;
        const totalCost = sonnetCost + haikuCost;

        panel.innerHTML = `
          <div class="system-section">
            ${services.map(s => `
              <div class="uptime-row">
                <div class="uptime-service">${s.name}</div>
                <div class="status-dot ${s.status === true ? 'up' : 'down'}"></div>
              </div>
            `).join('')}
          </div>

          <div class="system-section">
            <div class="api-usage-label">API Usage: ${apiUsage}%</div>
            <div class="api-usage-bar">
              <div class="api-usage-fill ${apiUsage > 80 ? 'high' : ''}" style="width: ${apiUsage}%;"></div>
            </div>
            <div class="api-cost-items">
              <div>Sonnet $${sonnetCost.toFixed(2)} · Haiku $${haikuCost.toFixed(2)} · Total $${totalCost.toFixed(2)}</div>
            </div>
          </div>

          <div class="system-section">
            <div class="cron-info">${cron.active || 0} jobs active · Next: ${cron.next || '—'}</div>
            <div class="model-pill">${model}</div>
            <div class="memory-info">Memory updated: ${memory}</div>
          </div>
        `;
      }

      document.getElementById('systemPanelTime').textContent = formatPanelTime(new Date());
    }

    // Update footer
    function updateFooter() {
      document.getElementById('lastSync').textContent = formatPanelTime(new Date());
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.key === 'r' || e.key === 'R') {
        fetchData();
      } else if (e.key >= '1' && e.key <= '5') {
        const idx = parseInt(e.key) - 1;
        const cards = document.querySelectorAll('.project-card');
        if (cards[idx]) {
          cards[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      } else if (e.key === 'a' || e.key === 'A') {
        document.querySelector('.panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });

    // Initial load and poll
    fetchData();
    setInterval(fetchData, 60000);
  </script>
</body>
</html>
